# ========================
# Clash-ALL 优化配置 v4
# ========================

# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
secret: "666666"

ipv6: true

# ========================
# DNS 设置
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - +.lan
    - +.local
    - geosite:cn

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 机场节点订阅
# ========================
p: &provider-default
  type: http
  interval: 864000
  proxy: 直连
  health-check:
    enable: true
    url: https://www.gstatic.com/generate_204
    interval: 300

proxy-providers:
  优质服务商:
    <<: *provider-default
    url: "http://192.168.5.100:3001/CKg2abstVnOeRpm1aB4G/download/collection/%E4%BC%98%E8%B4%A8%E8%AE%A2%E9%98%85"

  备用服务商:
    <<: *provider-default
    url: "http://192.168.5.100:3001/CKg2abstVnOeRpm1aB4G/download/collection/%E5%A4%87%E7%94%A8%E8%AE%A2%E9%98%85"

  自建服务商:
    <<: *provider-default
    url: "http://192.168.5.100:3001/CKg2abstVnOeRpm1aB4G/download/My"

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 策略组定义
# ========================
_default: &default
  type: select
  proxies:
    - 直连
    - 🌐 所有-手动
    - 🌐 所有-自动
    - 🇭🇰 香港-自动
    - 🇹🇼 台湾-自动
    - 🇯🇵 日本-自动
    - 🇸🇬 新加坡-自动
    - 🇰🇷 韩国-自动
    - 🇺🇸 美国-自动
    - 🇬🇧 英国-自动
    - 🌍 其他-自动
    - 拒绝

proxy-groups:

  # ── AI 服务 ──────────────────────────────
  - name: 💡 AI
    <<: *default

  # ── 社交 / 通讯 ──────────────────────────
  - {name: 🐱 GitHub,    <<: *default}
  - {name: 👽 Reddit,    <<: *default}
  - {name: ✈️ Telegram,  <<: *default}
  - {name: 💬 WhatsApp,  <<: *default}
  - {name: 👥 Facebook,  <<: *default}

  # ── 视频流媒体 ───────────────────────────
  - {name: 📺 BiliBili,    <<: *default}
  - {name: 📺 YouTube,     <<: *default}
  - {name: 🎵 TikTok,      <<: *default}
  - {name: 🎬 Netflix,     <<: *default}
  - {name: 🎬 HBO,         <<: *default}
  - {name: 🏰 Disney,      <<: *default}
  - {name: 📦 Amazon,      <<: *default}
  - {name: 🍥 Crunchyroll, <<: *default}
  - {name: 🍿 Popcorn,     <<: *default}

  # ── 音乐 ─────────────────────────────────
  - {name: 🎵 Spotify, <<: *default}

  # ── 科技平台 ─────────────────────────────
  - {name: 🟢 Nvidia,    <<: *default}
  - {name: 🍎 Apple,     <<: *default}
  - {name: 🔍 Google,    <<: *default}
  - {name: 🪟 Microsoft, <<: *default}

  # ── 游戏 ─────────────────────────────────
  - {name: 🎮 Steam, <<: *default}
  - {name: 🎮 Games, <<: *default}
  # ── EMBY ─────────────────────────────────
  - {name: 📽️ Emby代理, <<: *default}
  - {name: 📽️ Emby直连, <<: *default}  

  # ── 金融 ─────────────────────────────────
  - {name: 💰 Crypto, <<: *default}

  # ── 通用 / 兜底 ──────────────────────────
  - {name: 🧪 Test,  <<: *default}
  - {name: 🚫 Block, <<: *default}
  - {name: 🌏 国外,  <<: *default}
  - {name: 🇨🇳 国内,  <<: *default}
  - {name: 🔀 其他,  <<: *default}

  # ── 汇总节点组 ───────────────────────────
  - name: 🌐 所有-手动
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"

  - name: 🌐 所有-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "^((?!(直连|拒绝)).)*$"

  # ── 地区自动组 ───────────────────────────
  - name: 🇭🇰 香港-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  - name: 🇹🇼 台湾-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)).*$"

  - name: 🇯🇵 日本-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  - name: 🇸🇬 新加坡-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"

  - name: 🇰🇷 韩国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)).*$"

  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"

  - name: 🇬🇧 英国-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "(?=.*(英国|英|伦敦|UK|United Kingdom|🇬🇧|London)).*$"

  - name: 🌍 其他-自动
    type: url-test
    include-all: true
    tolerance: 50
    interval: 600
    filter: "^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|英国|UK|United Kingdom|伦敦|英|London|🇬🇧)).)*$"

